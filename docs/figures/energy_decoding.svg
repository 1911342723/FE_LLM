<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="520" viewBox="0 0 860 520" font-family="'Segoe UI','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#16a34a"/>
    </marker>
  </defs>

  <text x="430" y="36" text-anchor="middle" font-size="23" font-weight="bold" fill="#1a2b4a">能量递减解码：生成即"滚落到意图吸引子"</text>
  <text x="430" y="60" text-anchor="middle" font-size="13.5" fill="#5a6b8a">取代 Softmax 概率预测 — 导弹制导式：锁定目标意图，逐字修正航向降低残余能量</text>

  <!-- 能量曲面 -->
  <path d="M80,180 C180,180 220,140 300,200 C360,245 420,150 500,210 C560,255 620,170 700,220 C740,245 770,235 790,250"
        fill="none" stroke="#cbd5e1" stroke-width="2"/>

  <!-- 目标意图谷底 -->
  <circle cx="700" cy="260" r="9" fill="#16a34a"/>
  <text x="700" y="295" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">目标意图吸引子</text>
  <text x="700" y="312" text-anchor="middle" font-size="11.5" fill="#15803d">(预测编码坍缩得到)</text>

  <!-- 滚落小球轨迹 -->
  <circle cx="150" cy="175" r="8" fill="#ea580c"/>
  <text x="150" y="158" text-anchor="middle" font-size="11" fill="#9a3412">起点</text>

  <!-- token 步进 -->
  <g font-size="12" fill="#334155">
    <circle cx="150" cy="175" r="5" fill="#ea580c"/>
    <circle cx="300" cy="210" r="5" fill="#f59e0b"/>
    <circle cx="500" cy="225" r="5" fill="#fbbf24"/>
    <circle cx="700" cy="260" r="5" fill="#16a34a"/>
  </g>
  <path d="M158,178 Q230,205 293,208" fill="none" stroke="#16a34a" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#a2)"/>
  <path d="M308,212 Q400,235 493,224" fill="none" stroke="#16a34a" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#a2)"/>
  <path d="M508,228 Q600,250 693,258" fill="none" stroke="#16a34a" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#a2)"/>

  <text x="225" y="240" text-anchor="middle" font-size="11.5" fill="#9a3412">词1</text>
  <text x="400" y="262" text-anchor="middle" font-size="11.5" fill="#a16207">词2</text>
  <text x="600" y="280" text-anchor="middle" font-size="11.5" fill="#15803d">词3 → &lt;EOS&gt;</text>

  <!-- 纵轴 -->
  <line x1="60" y1="120" x2="60" y2="340" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="45" y="230" font-size="12" fill="#64748b" transform="rotate(-90 45 230)">残余能量 / 惊奇度</text>
  <line x1="60" y1="340" x2="800" y2="340" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="430" y="362" text-anchor="middle" font-size="12" fill="#64748b">解码步（逐 token 输出）</text>

  <!-- 公式说明框 -->
  <rect x="120" y="395" width="620" height="96" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="140" y="420" font-size="13.5" font-weight="bold" fill="#1e3a8a">每步决策：</text>
  <text x="140" y="443" font-size="13" fill="#334155">选择使"当前状态→目标意图"残余能量最低的 token：</text>
  <text x="430" y="467" text-anchor="middle" font-size="15" fill="#0f172a" font-style="italic">tokenₜ = argmin  E( 已生成前缀 + token , 意图向量 )</text>
  <text x="140" y="485" font-size="11.5" fill="#64748b">残余能量趋近 0 ⟶ 意图表达完毕 ⟶ 输出 &lt;EOS&gt;。等价于序列任务的交叉熵最小化。</text>
</svg>
