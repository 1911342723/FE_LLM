<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="560" viewBox="0 0 860 560" font-family="'Segoe UI','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#444"/>
    </marker>
  </defs>

  <text x="430" y="36" text-anchor="middle" font-size="23" font-weight="bold" fill="#1a2b4a">三层惊奇度与行动策略</text>
  <text x="430" y="60" text-anchor="middle" font-size="13.5" fill="#5a6b8a">Surprise = −ln P(Observation | Internal Model) 的工程分解：自下而上累加 + 阈值阻断</text>

  <!-- 输入 -->
  <rect x="340" y="86" width="180" height="44" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="430" y="113" text-anchor="middle" font-size="14" fill="#92400e">用户输入文本</text>

  <!-- 浅层 -->
  <rect x="120" y="170" width="620" height="80" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="140" y="198" font-size="16" font-weight="bold" fill="#1e3a8a">浅层惊奇  E_semantic</text>
  <text x="140" y="222" font-size="12.5" fill="#475569">输入向量到最近吸引子的余弦距离 → −ln 映射。衡量"语义连贯性"。</text>
  <text x="140" y="240" font-size="12" fill="#64748b">偏离已知概念 ⟶ 触发【追问】策略，收窄环境</text>
  <rect x="600" y="186" width="120" height="48" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="660" y="216" text-anchor="middle" font-size="14" fill="#1d4ed8">→ 追问</text>

  <!-- 中层 -->
  <rect x="120" y="270" width="620" height="80" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="140" y="298" font-size="16" font-weight="bold" fill="#9a3412">中层惊奇  E_causal</text>
  <text x="140" y="322" font-size="12.5" fill="#7c2d12">与已固化公理的逻辑冲突（离散事实，不由网络臆造）。衡量"因果断裂"。</text>
  <text x="140" y="340" font-size="12" fill="#a16207">违背公理 ⟶ 触发【反驳】策略，据理力争并索取约束</text>
  <rect x="600" y="286" width="120" height="48" rx="8" fill="#ffedd5" stroke="#ea580c"/>
  <text x="660" y="316" text-anchor="middle" font-size="14" fill="#c2410c">→ 反驳</text>

  <!-- 顶层 -->
  <rect x="120" y="370" width="620" height="80" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="140" y="398" font-size="16" font-weight="bold" fill="#991b1b">顶层噪音  E_noise</text>
  <text x="140" y="422" font-size="12.5" fill="#7f1d1d">可识别词元占比过低（纯乱码）→ 阶跃惩罚。衡量"无法解析度"。</text>
  <text x="140" y="440" font-size="12" fill="#b91c1c">超出安全阈值 ⟶ 触发【阻断】，强制终止无效计算以节能</text>
  <rect x="600" y="386" width="120" height="48" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="660" y="416" text-anchor="middle" font-size="14" fill="#b91c1c">→ 阻断</text>

  <!-- 低惊奇 -->
  <rect x="260" y="480" width="340" height="52" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="430" y="503" text-anchor="middle" font-size="14" font-weight="bold" fill="#166534">三层皆低 → 系统自洽（最小自由能）</text>
  <text x="430" y="522" text-anchor="middle" font-size="12" fill="#15803d">触发【确认 / 问候】，直接回应</text>

  <!-- 连线 -->
  <line x1="430" y1="130" x2="430" y2="170" stroke="#444" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="430" y1="250" x2="430" y2="270" stroke="#444" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="430" y1="350" x2="430" y2="370" stroke="#444" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="430" y1="450" x2="430" y2="480" stroke="#444" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- 优先级标注 -->
  <text x="70" y="310" font-size="12" fill="#475569" transform="rotate(-90 70 310)">决策优先级：阻断 &gt; 反驳 &gt; 追问 &gt; 确认</text>
</svg>
