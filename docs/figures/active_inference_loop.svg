<?xml version="1.0" encoding="UTF-8"?>
<svg width="1240" height="700" viewBox="0 0 1240 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
  <title id="t">Active inference closed loop and expected free energy</title>
  <desc id="d">An observation raises surprise, expected-free-energy minimization selects an action, the external action changes the environment, and the next observation lowers free energy. Includes the EFE decomposition and the surprise-relaxation trajectory.</desc>
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#111827"/></marker>
    <marker id="arG" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#047857"/></marker>
    <style>
      .pg{fill:#ffffff}
      .h1{font:700 23px Arial,Helvetica,sans-serif;fill:#111827}
      .h2{font:400 14px Arial,Helvetica,sans-serif;fill:#4b5563}
      .bt{font:700 15px Arial,Helvetica,sans-serif;fill:#111827}
      .lb{font:600 14px Arial,Helvetica,sans-serif;fill:#111827}
      .sm{font:400 12px Arial,Helvetica,sans-serif;fill:#374151}
      .mt{font:italic 14px "Times New Roman",Times,serif;fill:#1f2937}
      .tag{font:700 11px Arial,Helvetica,sans-serif;fill:#6b7280;letter-spacing:.06em}
      .obs{fill:#eff6ff;stroke:#1d4ed8;stroke-width:1.5}
      .err{fill:#fff7ed;stroke:#c2410c;stroke-width:1.5}
      .act{fill:#ecfdf5;stroke:#047857;stroke-width:1.5}
      .ext{fill:#f1f5f9;stroke:#64748b;stroke-width:1.4}
      .node{fill:#ffffff;stroke:#111827;stroke-width:1.3}
      .a{stroke:#111827;stroke-width:1.9;fill:none;marker-end:url(#ar)}
      .ag{stroke:#047857;stroke-width:1.9;fill:none;marker-end:url(#arG)}
    </style>
  </defs>
  <rect class="pg" width="1240" height="700"/>
  <text x="44" y="44" class="h1">Active inference loop: external action changes the world to lower future free energy</text>
  <text x="44" y="70" class="h2">Answering is one action among ask / retrieve / refuse / update_memory, all chosen by expected free energy G(a) = R + B - I + C.</text>

  <text x="44" y="116" class="tag">CLOSED LOOP</text>
  <ellipse class="obs" cx="200" cy="210" rx="118" ry="52"/>
  <text x="150" y="206" class="lb">Observation</text>
  <text x="150" y="228" class="mt">o_t = Obs(x_t)</text>

  <ellipse class="err" cx="470" cy="210" rx="120" ry="52"/>
  <text x="406" y="206" class="lb">Surprise high</text>
  <text x="392" y="228" class="sm">prediction broken: eps, S_t high</text>

  <ellipse class="act" cx="470" cy="430" rx="128" ry="54"/>
  <text x="402" y="420" class="lb">Policy: min G(a)</text>
  <text x="386" y="442" class="sm">pick high epistemic-value action (e.g. ASK)</text>

  <ellipse class="ext" cx="200" cy="430" rx="120" ry="54"/>
  <text x="140" y="420" class="lb">Environment</text>
  <text x="128" y="442" class="sm">action changes world (user supplies)</text>

  <path class="a" d="M318 205 H348"/>
  <text x="322" y="195" class="sm">o-&gt;eps</text>
  <path class="a" d="M470 262 V374"/>
  <text x="478" y="322" class="sm">surprise -&gt; select</text>
  <path class="ag" d="M342 430 H324"/>
  <text x="300" y="416" class="sm">action y_t</text>
  <path class="ag" d="M200 376 V264"/>
  <text x="80" y="324" class="sm">next obs o_(t+1)</text>
  <text x="80" y="342" class="sm">surprise drops = relax</text>

  <text x="640" y="116" class="tag">EXPECTED FREE ENERGY</text>
  <rect class="node" x="640" y="130" width="560" height="120" rx="8"/>
  <text x="660" y="162" class="mt" style="font-size:17px">G(a | b_t, o_t) = R(a) + B(a) - I(a) + C(a)</text>
  <text x="660" y="192" class="sm">R = risk . B = ambiguity . I = epistemic value . C = action cost</text>
  <text x="660" y="216" class="mt">a* = arg min_a G(a | b_t, o_t),  then  y_t = Realize(a*)</text>
  <text x="660" y="240" class="sm">CAPCW gives a second route: surprise = 1 - route match; bound -&gt; ANSWER, unbound -&gt; ASK.</text>

  <text x="640" y="290" class="tag">FREE-ENERGY MEANING OF EACH ACTION</text>
  <rect class="act" x="640" y="304" width="270" height="40" rx="6"/><text x="654" y="330" class="sm"><tspan class="lb">ANSWER</tspan>  low risk / low uncertainty -&gt; lower surprise</text>
  <rect class="act" x="640" y="350" width="270" height="40" rx="6"/><text x="654" y="376" class="sm"><tspan class="lb">ASK</tspan>  info missing / conflict -&gt; max epistemic value</text>
  <rect class="act" x="640" y="396" width="270" height="40" rx="6"/><text x="654" y="422" class="sm"><tspan class="lb">RETRIEVE</tspan>  needs external fact -&gt; lower ambiguity</text>
  <rect class="act" x="930" y="304" width="270" height="40" rx="6"/><text x="944" y="330" class="sm"><tspan class="lb">REFUSE</tspan>  high safety risk -&gt; minimize risk</text>
  <rect class="act" x="930" y="350" width="270" height="40" rx="6"/><text x="944" y="376" class="sm"><tspan class="lb">UPDATE_MEMORY</tspan>  stable preference -&gt; lower future EFE</text>
  <rect class="node" x="930" y="396" width="270" height="40" rx="6"/><text x="944" y="422" class="sm">guard: do not ask when uncertainty is low</text>

  <text x="44" y="540" class="tag">EVIDENCE: surprise-relaxation trajectory (live text, traceable)</text>
  <rect class="node" x="44" y="554" width="600" height="120" rx="8"/>
  <line x1="92" y1="568" x2="92" y2="652" stroke="#9ca3af" stroke-width="1"/>
  <line x1="92" y1="652" x2="620" y2="652" stroke="#9ca3af" stroke-width="1"/>
  <text x="50" y="566" class="sm">S</text>
  <rect x="150" y="576" width="60" height="76" fill="#fee2e2" stroke="#b91c1c"/><text x="146" y="668" class="sm">ask unbound</text><text x="160" y="600" class="sm">1.00</text>
  <rect x="300" y="576" width="60" height="76" fill="#fde68a" stroke="#b45309"/><text x="296" y="668" class="sm">ask -&gt; supply</text><text x="312" y="600" class="sm">act</text>
  <rect x="470" y="628" width="60" height="24" fill="#bbf7d0" stroke="#047857"/><text x="466" y="668" class="sm">re-ask -&gt; answer</text><text x="476" y="620" class="sm">0.06</text>

  <rect class="node" x="664" y="554" width="536" height="120" rx="8"/>
  <text x="682" y="580" class="lb">Isomorphic to Experiment B, decidable</text>
  <text x="682" y="606" class="sm">"prior ASK = predict the next obs supplies info": met -&gt; surprise drops.</text>
  <text x="682" y="630" class="sm">Experiment C: FE-agent task success 100% vs always-answer baseline 22%;</text>
  <text x="682" y="652" class="sm">after clarification, mean surprise drop 70%-88%; negative control does not drop.</text>
  <text x="682" y="670" class="sm">multi-hop: broken chain -&gt; ask -&gt; supply -&gt; re-ask retrieve (surprise 1.0 -&gt; 0.59).</text>

  <text x="44" y="694" class="sm">Legend: black = perception/decision flow; green = external action and its feedback. Action is not the endpoint, but a step that changes the world to lower future free energy.</text>
</svg>
