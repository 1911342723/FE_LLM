<svg width="1320" height="860" viewBox="0 0 1320 860" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">FE-LLM structured intent (slot) architecture</title>
  <desc id="desc">Two-panel diagram: (a) the single-vector intent bottleneck identified by the opus-100 translation experiment; (b) the proposed structured intent state with a global intent, K intent slots with salience weights, and a composite-energy decoder.</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#111827"/>
    </marker>
    <marker id="arrowBlue" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#1d4ed8"/>
    </marker>
    <marker id="arrowRed" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#c2410c"/>
    </marker>
    <style>
      .page { fill: #ffffff; }
      .panel { fill: #fbfbfc; stroke: #111827; stroke-width: 1.2; }
      .panelTitle { font: 700 18px Arial, Helvetica, sans-serif; fill: #111827; }
      .label { font: 600 16px Arial, Helvetica, sans-serif; fill: #111827; }
      .small { font: 400 13px Arial, Helvetica, sans-serif; fill: #374151; }
      .smallBold { font: 600 13px Arial, Helvetica, sans-serif; fill: #374151; }
      .math { font: italic 16px "Times New Roman", Times, serif; fill: #111827; }
      .mathSmall { font: italic 13px "Times New Roman", Times, serif; fill: #374151; }
      .node { fill: #ffffff; stroke: #111827; stroke-width: 1.3; }
      .latent { fill: #eef2ff; stroke: #3730a3; stroke-width: 1.4; }
      .slot { fill: #faf5ff; stroke: #7e22ce; stroke-width: 1.4; }
      .obs { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 1.4; }
      .act { fill: #ecfdf5; stroke: #047857; stroke-width: 1.4; }
      .err { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.4; }
      .trace { fill: #f8fafc; stroke: #475569; stroke-width: 1.2; }
      .bad { fill: #fef2f2; stroke: #b91c1c; stroke-width: 1.4; }
      .arrow { stroke: #111827; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .arrowBlue { stroke: #1d4ed8; stroke-width: 1.8; fill: none; marker-end: url(#arrowBlue); }
      .arrowRed { stroke: #c2410c; stroke-width: 1.6; fill: none; marker-end: url(#arrowRed); stroke-dasharray: 6 4; }
      .eqBox { fill: #ffffff; stroke: #d1d5db; stroke-width: 1; }
    </style>
  </defs>

  <rect class="page" width="1320" height="860"/>
  <text x="50" y="48" class="panelTitle" style="font-size:26px">FE-LLM intent serialization: from a point to a structure</text>
  <text x="50" y="76" class="small">Motivated by the opus-100 result (unseen word-F1 = 0.07): a single 128-d intent vector carries action-level semantics but not sentence-reconstruction semantics.</text>

  <!-- Panel (a): bottleneck -->
  <rect class="panel" x="50" y="110" width="500" height="700" rx="3"/>
  <text x="74" y="145" class="panelTitle">(a) v1 bottleneck (verified experimentally)</text>

  <rect class="obs" x="110" y="185" width="380" height="60" rx="7"/>
  <text x="160" y="211" class="label">prompt tokens (up to 48)</text>
  <text x="160" y="231" class="small">full fine-grained semantics</text>

  <path class="arrow" d="M300 245 V300"/>
  <text x="312" y="280" class="small">PER relaxation (IntentEncoder)</text>

  <circle class="latent" cx="300" cy="350" r="46"/>
  <text x="272" y="346" class="label">z*</text>
  <text x="252" y="368" class="mathSmall">single 128-d</text>

  <path class="arrowRed" d="M300 396 V456"/>
  <text x="312" y="432" class="smallBold" fill="#b91c1c">information bottleneck</text>

  <rect class="bad" x="110" y="456" width="380" height="86" rx="7"/>
  <text x="136" y="486" class="label">EnergyDecoder recovers only the cluster</text>
  <text x="136" y="508" class="small">outputs collapse to high-frequency sentences:</text>
  <text x="136" y="526" class="small">200 unseen inputs -&gt; 67 unique outputs, top-5 = 41.5%</text>

  <rect class="eqBox" x="110" y="580" width="380" height="196" rx="4"/>
  <text x="130" y="610" class="smallBold">What survives the bottleneck (verified):</text>
  <text x="130" y="634" class="small">- action-level semantics: policy accuracy 0.958</text>
  <text x="130" y="654" class="small">- chitchat-level reply selection (usable)</text>
  <text x="130" y="678" class="smallBold">What does not (verified):</text>
  <text x="130" y="702" class="small">- token-level content needed for translation</text>
  <text x="130" y="722" class="small">- unseen-sentence reconstruction (word-F1 0.07)</text>
  <text x="130" y="752" class="mathSmall">conclusion: scale alone cannot fix a representational bottleneck</text>

  <!-- Panel (b): slot architecture -->
  <rect class="panel" x="590" y="110" width="680" height="700" rx="3"/>
  <text x="614" y="145" class="panelTitle">(b) Structured intent state (xiang hierarchy, engineering form)</text>

  <rect class="obs" x="650" y="185" width="560" height="56" rx="7"/>
  <text x="780" y="209" class="label">prompt tokens</text>
  <text x="780" y="228" class="small">sequence representation after PER blocks</text>

  <path class="arrow" d="M760 241 C730 270 706 292 700 306"/>
  <text x="618" y="282" class="small">[CLS] relaxation</text>
  <path class="arrow" d="M1000 241 C1030 270 1056 292 1064 306"/>
  <text x="1060" y="282" class="small">K learned queries via PER</text>

  <circle class="latent" cx="700" cy="356" r="48"/>
  <text x="652" y="350" class="label">global_intent</text>
  <text x="668" y="372" class="mathSmall">"gua"</text>

  <g>
    <rect class="slot" x="950" y="312" width="64" height="40" rx="6"/>
    <rect class="slot" x="1022" y="312" width="64" height="40" rx="6"/>
    <rect class="slot" x="1094" y="312" width="64" height="40" rx="6"/>
    <rect class="slot" x="950" y="360" width="64" height="40" rx="6"/>
    <rect class="slot" x="1022" y="360" width="64" height="40" rx="6"/>
    <rect class="slot" x="1094" y="360" width="64" height="40" rx="6"/>
    <text x="966" y="337" class="mathSmall">s_1</text>
    <text x="1038" y="337" class="mathSmall">s_2</text>
    <text x="1110" y="337" class="mathSmall">s_3</text>
    <text x="966" y="385" class="mathSmall">s_4</text>
    <text x="1038" y="385" class="mathSmall">...</text>
    <text x="1110" y="385" class="mathSmall">s_K</text>
  </g>
  <text x="950" y="424" class="label">intent_slots ("yao")</text>
  <text x="950" y="444" class="small">+ slot_salience = explicit precision weights</text>

  <path class="arrow" d="M700 404 C700 450 730 492 790 510"/>
  <path class="arrow" d="M1050 404 C1040 450 1000 492 940 510"/>
  <text x="860" y="478" class="small">both condition generation</text>

  <rect class="act" x="710" y="510" width="440 " height="92" rx="7"/>
  <text x="736" y="540" class="label">SlotEnergyDecoder</text>
  <text x="736" y="562" class="small">per step: h_i + intent_proj(global) + cross-attention read of slots</text>
  <text x="736" y="582" class="small">cross-attention = routing only ("eyes"), never the explanation itself</text>

  <path class="arrow" d="M930 602 V646"/>

  <rect class="eqBox" x="650" y="646" width="560" height="84" rx="4"/>
  <text x="672" y="676" class="math">E_i = || h_i - global_intent ||</text>
  <text x="672" y="702" class="math">+ lambda_cov * sum_k salience_k * min_(j&lt;=i) || c_j - s_k ||</text>
  <text x="672" y="722" class="small">stop when all salient slots are covered: a principled EOS condition</text>

  <rect class="trace" x="650" y="748" width="560" height="46" rx="7"/>
  <text x="672" y="776" class="small">trace records: per-char residual energy + slot coverage + salience (energy quantities, not attention maps)</text>
</svg>
