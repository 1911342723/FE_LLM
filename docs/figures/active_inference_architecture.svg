<svg width="1320" height="820" viewBox="0 0 1320 820" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">FE-LLM active inference generative model</title>
  <desc id="desc">A two-panel scientific diagram showing the Markov blanket and the computational graph of FE-LLM.</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#111827"/>
    </marker>
    <marker id="arrowBlue" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#1d4ed8"/>
    </marker>
    <style>
      .page { fill: #ffffff; }
      .panel { fill: #fbfbfc; stroke: #111827; stroke-width: 1.2; }
      .panelTitle { font: 700 18px Arial, Helvetica, sans-serif; fill: #111827; }
      .label { font: 600 16px Arial, Helvetica, sans-serif; fill: #111827; }
      .small { font: 400 13px Arial, Helvetica, sans-serif; fill: #374151; }
      .math { font: italic 16px "Times New Roman", Times, serif; fill: #111827; }
      .mathSmall { font: italic 13px "Times New Roman", Times, serif; fill: #374151; }
      .node { fill: #ffffff; stroke: #111827; stroke-width: 1.3; }
      .latent { fill: #eef2ff; stroke: #3730a3; stroke-width: 1.4; }
      .obs { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 1.4; }
      .act { fill: #ecfdf5; stroke: #047857; stroke-width: 1.4; }
      .err { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.4; }
      .trace { fill: #f8fafc; stroke: #475569; stroke-width: 1.2; }
      .blanket { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.1; stroke-dasharray: 7 5; }
      .arrow { stroke: #111827; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .arrowBlue { stroke: #1d4ed8; stroke-width: 1.8; fill: none; marker-end: url(#arrowBlue); }
      .dash { stroke: #64748b; stroke-width: 1.4; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
      .eqBox { fill: #ffffff; stroke: #d1d5db; stroke-width: 1; }
    </style>
  </defs>

  <rect class="page" width="1320" height="820"/>
  <text x="50" y="48" class="panelTitle" style="font-size:26px">FE-LLM v1 as an active-inference language system</text>
  <text x="50" y="76" class="small">Prompt is treated as an observation; text generation is an action selected by expected free energy minimization.</text>

  <rect class="panel" x="50" y="110" width="570" height="640" rx="3"/>
  <text x="74" y="145" class="panelTitle">(a) Markov blanket interpretation</text>

  <rect class="blanket" x="112" y="250" width="438" height="260" rx="18"/>
  <text x="248" y="276" class="small">Markov blanket</text>

  <ellipse class="node" cx="330" cy="184" rx="108" ry="42"/>
  <text x="274" y="180" class="label">External state</text>
  <text x="268" y="202" class="small">user, tools, world</text>

  <ellipse class="obs" cx="210" cy="346" rx="100" ry="42"/>
  <text x="162" y="342" class="label">Sensory state</text>
  <text x="166" y="364" class="mathSmall">o_t, s_t = phi(o_t)</text>

  <ellipse class="act" cx="452" cy="346" rx="96" ry="42"/>
  <text x="410" y="342" class="label">Active state</text>
  <text x="406" y="364" class="mathSmall">a_t, y_t</text>

  <ellipse class="latent" cx="330" cy="480" rx="116" ry="45"/>
  <text x="282" y="474" class="label">Internal state</text>
  <text x="258" y="498" class="mathSmall">b_t = (z_t, c_t, q_t, A_t, U_t)</text>

  <path class="arrowBlue" d="M300 225 C268 258 237 290 220 304"/>
  <text x="182" y="270" class="small">observation</text>
  <path class="arrow" d="M287 444 C252 412 230 388 218 388"/>
  <text x="250" y="420" class="small">prediction error</text>
  <path class="arrow" d="M380 444 C418 411 444 388 450 388"/>
  <text x="414" y="420" class="small">policy</text>
  <path class="arrow" d="M452 304 C430 260 392 226 364 218"/>
  <text x="426" y="266" class="small">action changes world</text>

  <rect class="eqBox" x="96" y="585" width="478" height="112" rx="4"/>
  <text x="118" y="618" class="math">epsilon_t = s_t - f_theta(b_{t-1})</text>
  <text x="118" y="654" class="math">S_t = sum_i pi_i epsilon_t^i / sum_i pi_i</text>
  <text x="118" y="690" class="math">a*_t = arg min_a G(a | b_t, o_t)</text>

  <rect class="panel" x="700" y="110" width="570" height="640" rx="3"/>
  <text x="724" y="145" class="panelTitle">(b) Computational graph used in v1</text>

  <circle class="obs" cx="822" cy="230" r="46"/>
  <text x="794" y="226" class="label">Obs</text>
  <text x="786" y="248" class="mathSmall">o_t</text>

  <circle class="node" cx="1000" cy="230" r="46"/>
  <text x="970" y="226" class="label">Encode</text>
  <text x="974" y="248" class="mathSmall">s_t</text>

  <circle class="latent" cx="1168" cy="230" r="46"/>
  <text x="1136" y="226" class="label">Prior</text>
  <text x="1134" y="248" class="mathSmall">b_{t-1}</text>

  <circle class="node" cx="1168" cy="388" r="46"/>
  <text x="1136" y="384" class="label">Predict</text>
  <text x="1144" y="406" class="mathSmall">s_hat</text>

  <circle class="err" cx="1000" cy="388" r="50"/>
  <text x="962" y="384" class="label">Error</text>
  <text x="956" y="406" class="mathSmall">epsilon_t, S_t</text>

  <circle class="latent" cx="822" cy="388" r="48"/>
  <text x="790" y="384" class="label">Update</text>
  <text x="798" y="406" class="mathSmall">b_t</text>

  <rect class="act" x="758" y="522" width="170" height="82" rx="7"/>
  <text x="790" y="554" class="label">Action set</text>
  <text x="774" y="578" class="small">answer / ask / retrieve</text>

  <rect class="err" x="980" y="522" width="170" height="82" rx="7"/>
  <text x="1006" y="554" class="label">Score G(a)</text>
  <text x="998" y="578" class="mathSmall">R + B - I + C</text>

  <rect class="trace" x="858" y="654" width="194" height="58" rx="7"/>
  <text x="908" y="679" class="label">Trace</text>
  <text x="882" y="700" class="small">evidence for every response</text>

  <path class="arrow" d="M868 230 H954"/>
  <path class="arrow" d="M1122 230 H1046"/>
  <path class="arrow" d="M1168 276 V342"/>
  <path class="arrow" d="M1122 388 H1050"/>
  <path class="arrow" d="M954 388 H870"/>
  <path class="arrow" d="M822 436 V522"/>
  <path class="arrow" d="M928 563 H980"/>
  <path class="dash" d="M1065 604 C1034 635 998 654 955 654"/>
  <path class="dash" d="M842 604 C870 634 902 653 955 654"/>
</svg>

