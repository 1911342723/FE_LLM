<?xml version="1.0" encoding="UTF-8"?>
<svg width="1240" height="760" viewBox="0 0 1240 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
  <title id="t">Multi-hop chaining: latent iterative read vs decode-to-re-embed CoT</title>
  <desc id="d">Latent iterative read feeds an entangled latent vector back as the next query and fails to chain; decode-to-re-embed (latent chain-of-thought) decodes each hop to a discrete symbol and re-embeds it as the next query, which succeeds; a 2x2 factorial shows the dominant driver is intermediate supervision.</desc>
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#111827"/></marker>
    <marker id="arR" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#b91c1c"/></marker>
    <marker id="arG" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#047857"/></marker>
    <style>
      .pg{fill:#ffffff}
      .h1{font:700 22px Arial,Helvetica,sans-serif;fill:#111827}
      .h2{font:400 14px Arial,Helvetica,sans-serif;fill:#4b5563}
      .bt{font:700 14px Arial,Helvetica,sans-serif;fill:#111827}
      .lb{font:600 13px Arial,Helvetica,sans-serif;fill:#111827}
      .sm{font:400 12px Arial,Helvetica,sans-serif;fill:#374151}
      .mt{font:italic 13px "Times New Roman",Times,serif;fill:#1f2937}
      .tag{font:700 11px Arial,Helvetica,sans-serif;fill:#6b7280;letter-spacing:.06em}
      .fail{font:700 14px Arial,Helvetica,sans-serif;fill:#b91c1c}
      .pass{font:700 14px Arial,Helvetica,sans-serif;fill:#047857}
      .node{fill:#ffffff;stroke:#111827;stroke-width:1.3}
      .slot{fill:#f5f3ff;stroke:#4338ca;stroke-width:1.4}
      .latv{fill:#fef2f2;stroke:#b91c1c;stroke-width:1.4}
      .sym{fill:#ecfdf5;stroke:#047857;stroke-width:1.5}
      .read{fill:#eef2ff;stroke:#3730a3;stroke-width:1.3}
      .panelF{fill:#fffafa;stroke:#b91c1c;stroke-width:1.4}
      .panelP{fill:#f7fffb;stroke:#047857;stroke-width:1.6}
      .a{stroke:#111827;stroke-width:1.6;fill:none;marker-end:url(#ar)}
      .ared{stroke:#b91c1c;stroke-width:1.8;fill:none;marker-end:url(#arR)}
      .agr{stroke:#047857;stroke-width:1.8;fill:none;marker-end:url(#arG)}
    </style>
  </defs>
  <rect class="pg" width="1240" height="760"/>
  <text x="44" y="44" class="h1">Multi-hop chaining: latent iterative read (FAIL) vs decode-&gt;re-embed latent CoT (PASS)</text>
  <text x="44" y="70" class="h2">Chain c0 -&gt; c1 -&gt; c2; query c0, answer c2; must compose several bindings on the fly. Sole variable = how the intermediate is passed between hops.</text>

  <rect class="panelF" x="44" y="92" width="1152" height="178" rx="10"/>
  <text x="64" y="120" class="bt">(a) Latent iterative read: feed the entangled latent vector directly as the next query</text>
  <text x="980" y="120" class="fail">FAIL (H2 approx H1)</text>

  <rect class="slot" x="64" y="150" width="150" height="74" rx="7"/><text x="80" y="178" class="lb">slot workspace W</text><text x="80" y="200" class="sm">(fixed, not updated)</text>
  <rect class="read" x="262" y="150" width="130" height="74" rx="7"/><text x="278" y="178" class="lb">read1</text><text x="278" y="200" class="mt">latent vector</text>
  <rect class="latv" x="440" y="150" width="150" height="74" rx="7"/><text x="456" y="178" class="lb">to_next(read1)</text><text x="456" y="200" class="sm">still entangled latent</text>
  <rect class="read" x="638" y="150" width="130" height="74" rx="7"/><text x="654" y="178" class="lb">read2</text><text x="654" y="200" class="sm">approx re-read same</text>
  <rect class="node" x="816" y="150" width="150" height="74" rx="7"/><text x="832" y="178" class="lb">answer c2_hat</text><text x="832" y="200" class="sm">no chaining</text>

  <path class="a" d="M214 187 H260"/>
  <path class="ared" d="M392 187 H438"/>
  <path class="ared" d="M590 187 H636"/>
  <path class="a" d="M768 187 H814"/>
  <text x="998" y="180" class="sm">Diagnosis: at d=32 the</text>
  <text x="998" y="198" class="sm">intermediate cannot be re-</text>
  <text x="998" y="216" class="sm">injected as a clean key query.</text>

  <rect class="panelP" x="44" y="290" width="1152" height="196" rx="10"/>
  <text x="64" y="318" class="bt">(b) decode-&gt;re-embed (latent CoT): decode each hop to a discrete symbol, re-embed it as the next query</text>
  <text x="980" y="318" class="pass">PASS (multi-hop +0.30)</text>

  <rect class="slot" x="64" y="350" width="132" height="74" rx="7"/><text x="80" y="378" class="lb">W</text><text x="80" y="400" class="sm">content-addressed</text>
  <rect class="read" x="232" y="350" width="120" height="74" rx="7"/><text x="248" y="378" class="lb">read1</text>
  <rect class="node" x="388" y="350" width="120" height="74" rx="7"/><text x="404" y="378" class="lb">head decode</text><text x="404" y="400" class="mt">logits1</text>
  <rect class="sym" x="544" y="350" width="132" height="74" rx="7"/><text x="560" y="374" class="lb">symbol c1_hat</text><text x="560" y="396" class="sm">(intermediate sup = CoT)</text>
  <rect class="read" x="712" y="350" width="138" height="74" rx="7"/><text x="728" y="374" class="lb">re-embed</text><text x="728" y="396" class="mt">q2 = to_q(emb(c1_hat))</text>
  <rect class="sym" x="886" y="350" width="132" height="74" rx="7"/><text x="902" y="378" class="lb">... c2_hat answer</text>
  <rect class="node" x="1054" y="350" width="120" height="74" rx="7"/><text x="1070" y="374" class="lb">traceable</text><text x="1070" y="396" class="sm">CoT trace</text>

  <path class="a" d="M196 387 H230"/>
  <path class="a" d="M352 387 H386"/>
  <path class="agr" d="M508 387 H542"/>
  <path class="agr" d="M676 387 H710"/>
  <path class="agr" d="M850 387 H884"/>
  <path class="a" d="M1018 387 H1052"/>
  <path class="agr" d="M781 424 C781 452 300 452 130 426"/>
  <text x="420" y="448" class="sm">Each hop emits one discrete intermediate, then retrieves the next hop by it (just as LLM multi-hop needs CoT).</text>

  <text x="44" y="520" class="tag">2x2 FACTORIAL: the dominant driver is INTERMEDIATE SUPERVISION, not decode-&gt;re-embed itself</text>
  <rect class="node" x="44" y="534" width="470" height="150" rx="8"/>
  <line x1="214" y1="534" x2="214" y2="684" stroke="#d1d5db"/><line x1="364" y1="534" x2="364" y2="684" stroke="#d1d5db"/>
  <line x1="44" y1="584" x2="514" y2="584" stroke="#d1d5db"/><line x1="44" y1="634" x2="514" y2="634" stroke="#d1d5db"/>
  <text x="226" y="566" class="sm">final-only sup</text><text x="382" y="566" class="sm">intermediate sup</text>
  <text x="58" y="612" class="sm">latent read</text><text x="250" y="612" class="mt">0.114</text><text x="400" y="612" class="mt">0.374</text>
  <text x="58" y="662" class="sm">decode-re-embed</text><text x="250" y="662" class="mt">0.132</text><text x="392" y="662" class="bt">0.413</text>
  <text x="58" y="556" class="lb">multi-hop (H&gt;=2) tail accuracy</text>

  <rect class="node" x="538" y="534" width="318" height="150" rx="8"/>
  <text x="556" y="560" class="lb">Main-effect decomposition</text>
  <text x="556" y="588" class="sm">intermediate-sup main effect = <tspan class="pass">+0.271</tspan></text>
  <text x="556" y="612" class="sm">decode-re-embed main effect = +0.029</text>
  <text x="556" y="640" class="sm">Correction: the key is supervising/</text>
  <text x="556" y="660" class="sm">demonstrating intermediate steps; pure</text>
  <text x="556" y="678" class="sm">emergence (no sup) fails; sup self-bootstraps to GT 97%.</text>

  <rect class="sym" x="880" y="534" width="316" height="150" rx="8"/>
  <text x="898" y="560" class="lb">Live-text instance (real controller)</text>
  <text x="898" y="586" class="sm">bind: A.manager = B ; B.desk = C302</text>
  <text x="898" y="610" class="sm">ask: what is A.manager.desk ?</text>
  <text x="898" y="636" class="mt">CoT trace: B -&gt; C302</text>
  <text x="898" y="660" class="pass">answer: A.manager.desk = C302</text>
  <text x="898" y="678" class="sm">broken chain -&gt; ask; supply -&gt; re-ask -&gt; relax.</text>

  <text x="44" y="716" class="sm">Key result: multi-hop chaining needs EXPLICIT decoding of the intermediate symbol and retrieval by it (latent CoT), not repeated latent attention -- reproducing "LLM multi-hop needs CoT".</text>
  <text x="44" y="740" class="sm">Honest boundary: absolute values are capacity-bound at d=32 (decay at higher hop counts). Legend: red = latent feedback (failing path), green = discrete-symbol feedback (CoT, working path).</text>
</svg>
