<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="820" height="520" viewBox="0 0 820 520" font-family="'Segoe UI','Microsoft YaHei',sans-serif">
  <text x="410" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a2b4a">算术实验：惊奇能量曲线（23 + 45 = 68）</text>
  <text x="410" y="59" text-anchor="middle" font-size="13" fill="#5a6b8a">正确答案位于能量谷底（惊奇=0），偏离越远惊奇度单调上升 — 验证"惊奇=错误答案的高能量"</text>

  <!-- 坐标轴 -->
  <line x1="90" y1="410" x2="760" y2="410" stroke="#475569" stroke-width="2"/>
  <line x1="90" y1="100" x2="90" y2="410" stroke="#475569" stroke-width="2"/>
  <text x="50" y="255" font-size="13" fill="#475569" transform="rotate(-90 50 255)">相对惊奇度</text>
  <text x="425" y="440" text-anchor="middle" font-size="13" fill="#475569">候选答案</text>

  <!-- 数据点 (相对惊奇度，来自实测 demo) -->
  <!-- 58:49.11  66:30.44  67:9.84  68:0  69:13.73  70:34.74  78:121.73 -->
  <!-- y 比例：121.73 → 高度约 290px，scale = 290/121.73 ≈ 2.38；y = 410 - val*2.38 -->
  <polyline points="150,293 250,338 320,387 410,410 480,377 550,327 700,120"
            fill="none" stroke="#2563eb" stroke-width="2.5"/>

  <!-- 柱状 + 点 -->
  <g font-size="12" fill="#1e3a8a">
    <circle cx="150" cy="293" r="6" fill="#dc2626"/><text x="150" y="428" text-anchor="middle">58</text><text x="150" y="282" text-anchor="middle" font-size="11" fill="#dc2626">+49.1</text>
    <circle cx="250" cy="338" r="6" fill="#ea580c"/><text x="250" y="428" text-anchor="middle">66</text><text x="250" y="327" text-anchor="middle" font-size="11" fill="#ea580c">+30.4</text>
    <circle cx="320" cy="387" r="6" fill="#f59e0b"/><text x="320" y="428" text-anchor="middle">67</text><text x="320" y="376" text-anchor="middle" font-size="11" fill="#a16207">+9.8</text>
    <circle cx="410" cy="410" r="8" fill="#16a34a"/><text x="410" y="428" text-anchor="middle" font-weight="bold">68</text><text x="410" y="402" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">0 (谷底)</text>
    <circle cx="480" cy="377" r="6" fill="#f59e0b"/><text x="480" y="428" text-anchor="middle">69</text><text x="480" y="366" text-anchor="middle" font-size="11" fill="#a16207">+13.7</text>
    <circle cx="550" cy="327" r="6" fill="#ea580c"/><text x="550" y="428" text-anchor="middle">70</text><text x="550" y="316" text-anchor="middle" font-size="11" fill="#ea580c">+34.7</text>
    <circle cx="700" cy="120" r="6" fill="#dc2626"/><text x="700" y="428" text-anchor="middle">78</text><text x="700" y="110" text-anchor="middle" font-size="11" fill="#dc2626">+121.7</text>
  </g>

  <!-- 谷底标注 -->
  <line x1="410" y1="410" x2="410" y2="455" stroke="#16a34a" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- 结果框 -->
  <rect x="120" y="468" width="580" height="40" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.3"/>
  <text x="410" y="493" text-anchor="middle" font-size="13" fill="#166534">能量法解题准确率 100% · 解码器(标量意图滚落)准确率 ≈ 99%（测试集 1000 题）</text>
</svg>
