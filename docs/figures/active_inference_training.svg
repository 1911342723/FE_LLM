<svg width="1320" height="820" viewBox="0 0 1320 820" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">FE-LLM policy training objective</title>
  <desc id="desc">A scientific diagram showing class imbalance, model inputs, weighted loss, and validation metrics.</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#111827"/>
    </marker>
    <style>
      .page { fill: #ffffff; }
      .panel { fill: #fbfbfc; stroke: #111827; stroke-width: 1.2; }
      .panelTitle { font: 700 18px Arial, Helvetica, sans-serif; fill: #111827; }
      .small { font: 400 13px Arial, Helvetica, sans-serif; fill: #374151; }
      .label { font: 600 15px Arial, Helvetica, sans-serif; fill: #111827; }
      .math { font: italic 16px "Times New Roman", Times, serif; fill: #111827; }
      .axis { stroke: #111827; stroke-width: 1.4; }
      .grid { stroke: #e5e7eb; stroke-width: 1; }
      .bar { fill: #2563eb; }
      .bar2 { fill: #ea580c; }
      .node { fill: #ffffff; stroke: #111827; stroke-width: 1.3; }
      .feature { fill: #eef2ff; stroke: #3730a3; stroke-width: 1.3; }
      .loss { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.3; }
      .metric { fill: #ecfdf5; stroke: #047857; stroke-width: 1.3; }
      .arrow { stroke: #111827; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 1.4; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="page" width="1320" height="820"/>
  <text x="50" y="48" class="panelTitle" style="font-size:26px">Small-module training for FE-LLM v1</text>
  <text x="50" y="76" class="small">Existing dialogue data trains the ANSWER class; concurrent teacher generation supplies non-answer active-inference decisions.</text>

  <rect class="panel" x="50" y="112" width="380" height="650" rx="3"/>
  <text x="74" y="148" class="panelTitle">(a) Policy data distribution</text>
  <line class="axis" x1="110" y1="650" x2="360" y2="650"/>
  <line class="axis" x1="110" y1="220" x2="110" y2="650"/>
  <line class="grid" x1="110" y1="560" x2="360" y2="560"/>
  <line class="grid" x1="110" y1="470" x2="360" y2="470"/>
  <line class="grid" x1="110" y1="380" x2="360" y2="380"/>
  <line class="grid" x1="110" y1="290" x2="360" y2="290"/>
  <text x="74" y="224" class="small">log count</text>
  <rect class="bar" x="136" y="246" width="32" height="404"/>
  <rect class="bar2" x="185" y="518" width="32" height="132"/>
  <rect class="bar2" x="234" y="525" width="32" height="125"/>
  <rect class="bar2" x="283" y="530" width="32" height="120"/>
  <rect class="bar2" x="332" y="536" width="32" height="114"/>
  <text x="122" y="684" class="small" transform="rotate(-35 122 684)">ANSWER</text>
  <text x="172" y="684" class="small" transform="rotate(-35 172 684)">ASK</text>
  <text x="222" y="684" class="small" transform="rotate(-35 222 684)">RETRIEVE</text>
  <text x="284" y="684" class="small" transform="rotate(-35 284 684)">REFUSE</text>
  <text x="334" y="684" class="small" transform="rotate(-35 334 684)">MEM</text>
  <text x="132" y="238" class="small">8k local dialogue</text>
  <text x="188" y="506" class="small">teacher generated</text>

  <rect class="panel" x="470" y="112" width="390" height="650" rx="3"/>
  <text x="494" y="148" class="panelTitle">(b) Policy selector input</text>

  <rect class="feature" x="548" y="210" width="230" height="68" rx="5"/>
  <text x="590" y="240" class="label">Intent vector</text>
  <text x="594" y="262" class="math">z = phi(o_t)</text>

  <rect class="feature" x="548" y="330" width="230" height="68" rx="5"/>
  <text x="590" y="360" class="label">Prediction error</text>
  <text x="568" y="382" class="math">epsilon = [sem,int,cons,unc,safe]</text>

  <rect class="feature" x="548" y="450" width="230" height="68" rx="5"/>
  <text x="590" y="480" class="label">Prompt features</text>
  <text x="586" y="502" class="small">risk flags, ambiguity, external facts</text>

  <rect class="node" x="548" y="590" width="230" height="70" rx="5"/>
  <text x="604" y="620" class="label">Tiny MLP</text>
  <text x="588" y="642" class="math">P_psi(a | z, epsilon, h)</text>
  <path class="arrow" d="M663 278 V330"/>
  <path class="arrow" d="M663 398 V450"/>
  <path class="arrow" d="M663 518 V590"/>

  <rect class="panel" x="900" y="112" width="370" height="650" rx="3"/>
  <text x="924" y="148" class="panelTitle">(c) Objective and validation</text>

  <rect class="loss" x="950" y="214" width="270" height="112" rx="5"/>
  <text x="974" y="252" class="math">L_policy = - sum_k w_k 1[a=k]</text>
  <text x="1048" y="282" class="math">log P_psi(a=k | z, epsilon, h)</text>
  <text x="974" y="306" class="small">class weights prevent ANSWER collapse</text>

  <rect class="metric" x="950" y="406" width="270" height="112" rx="5"/>
  <text x="986" y="442" class="label">Validation metrics</text>
  <text x="986" y="470" class="small">overall accuracy: sanity check</text>
  <text x="986" y="494" class="small">balanced accuracy: primary signal</text>

  <rect class="node" x="950" y="590" width="270" height="82" rx="5"/>
  <text x="986" y="622" class="label">Deployment rule</text>
  <text x="978" y="648" class="small">No online parameter update.</text>
  <text x="978" y="668" class="small">Memory writes are candidates only.</text>
  <path class="arrow" d="M778 625 H950"/>
  <path class="dash" d="M1085 326 V406"/>
  <path class="dash" d="M1085 518 V590"/>
</svg>

