  <title id="t">CAPCW content-addressed predictive-coding workspace</title>
  <desc id="d">The CAPCW core engine as a predictive-coding cycle: slots generate top-down predictions, bottom-up errors are routed to slots by content, relaxation descends free energy, and a query is read out by content addressing; growth adds slots when free energy stays high.</desc>
